<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
  <title>Escalier en plan</title>
  <desc>Symbole d'escalier droit vu en plan, fond transparent.</desc>

  <!-- Contour -->
  <rect x="30" y="30" width="260" height="120"
        fill="none" stroke="#1F2937" stroke-width="6"/>

  <!-- Marches -->
  <g stroke="#1F2937" stroke-width="4">
    <line x1="55" y1="30" x2="55" y2="150"/>
    <line x1="80" y1="30" x2="80" y2="150"/>
    <line x1="105" y1="30" x2="105" y2="150"/>
    <line x1="130" y1="30" x2="130" y2="150"/>
    <line x1="155" y1="30" x2="155" y2="150"/>
    <line x1="180" y1="30" x2="180" y2="150"/>
    <line x1="205" y1="30" x2="205" y2="150"/>
    <line x1="230" y1="30" x2="230" y2="150"/>
    <line x1="255" y1="30" x2="255" y2="150"/>
  </g>

  <!-- Flèche de montée -->
  <g fill="none" stroke="#1F2937" stroke-width="6"
     stroke-linecap="round" stroke-linejoin="round">
    <line x1="65" y1="90" x2="250" y2="90"/>
    <polyline points="225,65 250,90 225,115"/>
  </g>
</svg>
